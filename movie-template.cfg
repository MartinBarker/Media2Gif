# ============================================================
# Media-To-Gif Configuration Template
# ============================================================
# Copy this file and rename it to match your movie:
#   e.g. "Heat.cfg", "Antz.cfg", "Avatar.cfg"
#
# Run with:
#   python make_gifs.py YourMovifg
#
# CLI flags override config values:
#   python make_gifs.py YourMovie.cfg --interval 10 --maxGifs 5
# ============================================================

[movie]

# ---- Required -----------------------------------------------
# Full path to the movie/video file (mp4, mkv, etc.)
movie_path = /mnt/q/movies/Movie Title (Year)/Movie.Title.Year.1080p.mp4

# ---- Subtitles ----------------------------------------------
# Path to an external .srt subtitle file (optional)
# Leave empty to auto-detect a .srt in the same folder as the movie,
# or to use embedded subtitle tracks in the video file.
subtitle_path =

# Index of an embedded subtitle track to use (optional)
# Run with --listSubtitleTracks to see available track numbers.
# Leave empty to auto-detect or be prompted interactively.
subtitle_track =

# ---- Output -------------------------------------------------
# Directory where GIFs will be saved.
# A relative path is resolved relative to the movie file's directory.
output_folder = gifs_output

# Automatically split GIFs into sub-folders of this many files.
# e.g. 100 → batch_001/, batch_002/, ...
# Leave empty (or 0) to keep everything flat in output_folder.
output_batch_folder_size = 100

# ---- Timing -------------------------------------------------
# Duration in seconds of each GIF clip.
interval = 5

# Timestamp to start generating GIFs from (hh:mm:ss).
# Useful to skip intros / credits.
start_time = 00:00:00

# Maximum number of GIFs to generate before stopping.
# Leave empty for unlimited.
max_gifs =

# ---- Randomisation ------------------------------------------
# true  → iterate through start times in random order
# false → iterate sequentially from start_time (default)
random_times = false

# true  → pick GIFs around subtitle timings (quote-driven random mode)
#          combine with random_times = true to also fill non-dialogue gaps
# false → use fixed interval stepping (default)
random_quote = false

# ---- Subtitles / Quotes ------------------------------------
# true  → overlay subtitle text on each GIF (default)
# false → generate GIFs with no text overlay
quotes = true

# Color of the subtitle text.
# Accepts any CSS/HTML color name: white, yellow, cyan, red, lime, ...
subtitle_color = white

# Font size of the subtitle text in pixels.
subtitle_size = 35

# Width of the black stroke/border drawn around the text in pixels.
# 0 = no border; 2–4 = typical values.
text_border = 3

# Padding (in pixels) on all sides of the text to prevent clipping.
text_padding = 15

# Padding from the bottom edge of the frame to the text baseline.
# Leave empty to use the text_padding value.
bottom_padding = 20

# true  → convert all subtitle text to UPPERCASE
# false → keep original casing (default)
uppercase = true

# true  → apply an italic skew to the subtitle text
# false → normal upright text (default)
italicize = false

# true  → keep trailing periods on subtitles (default)
# false → strip trailing periods from every quote
trailing_period = true

# ---- File Size ---------------------------------------------
# Maximum allowed file size for each GIF.
# Supports: "15mb", "15MB", "15000kb", or a plain number (treated as MB).
# Leave empty for no size cap (a _resized.gif copy capped at 15 MB is
# still created automatically by ImageMagick if it is installed).
max_filesize = 15mb

# ---- Color / HDR -------------------------------------------
# Remove HDR metadata and convert to SDR before making the GIF.
# Useful for HDR/Dolby Vision source files that look washed-out.
# true / false
no_hdr = false

# Boost color saturation and contrast of the whole clip by N percent
# using an ffmpeg filter (applied before frame extraction).
# 0 = disabled; 20 = moderate boost; 50 = strong boost.
boost_colors = 0

# Boost color saturation, contrast, and brightness of each individual
# frame using Pillow (applied after frame extraction, before encoding).
# 0 = disabled; 20 = moderate boost; 50 = strong boost.
boost_frame_colors = 0

# ---- Crop / Letterbox ---------------------------------------
# Remove baked-in letterbox black bars from the video frames.
#   false → no cropping, keep frames as-is (default)
#   auto  → sample 100 random frames, auto-detect black bars at
#           top & bottom, save crop values to the prefs JSON,
#           and apply the crop when generating every GIF.
crop_padding = false

# ---- AI Description -----------------------------------------
# Use Ollama to auto-describe each GIF as it is created.
# Requires: ollama serve running locally with the model pulled.
#   true  → describe GIFs in background threads while generating
#   false → skip AI descriptions (default)
describe = false

# Which Ollama vision model to use for descriptions.
# Options: llava, llava:13b, llava:34b, bakllava
describe_model = llava

# ---- Metadata / History ------------------------------------
# true  → save a gifs_metadata.json file alongside the GIFs containing
#          filename, quote, startTime, and endTime for each GIF.
save_json = true

# true  → read gifs_metadata.json from a previous run and skip any GIFs
#          that were already exported (de-duplication across runs).
check_history = true

# ---- Debug -------------------------------------------------
# true  → keep every intermediate temp file produced during size
#          optimisation so you can inspect what each iteration looks like.
# false → clean up temp files automatically (default)
debug = false
