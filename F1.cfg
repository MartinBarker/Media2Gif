# ============================================================
# F1 (2025) - Media-To-Gif Configuration
# ============================================================
# Run with:
#   python make_gifs.py F1.cfg
# ============================================================

[movie]

# ---- Required -----------------------------------------------
movie_path = /mnt/q/movies/F1 The Movie (2025)/F1 (2025) WEBDL-1080p.mkv

# ---- Subtitles ----------------------------------------------
subtitle_path =
subtitle_track =

# ---- Output -------------------------------------------------
output_folder = gifs_output
output_batch_folder_size = 0

# ---- Timing -------------------------------------------------
interval = 5
start_time = 00:00:00
max_gifs =

# ---- Randomisation ------------------------------------------
random_times = false
random_quote = false

# ---- Subtitles / Quotes ------------------------------------
quotes = true
subtitle_color = white
subtitle_size = 50
text_border = 3
text_padding = 15
bottom_padding = 20
uppercase = true
italicize = false
trailing_period = false

# ---- File Size ---------------------------------------------
max_filesize = 15mb

# ---- Color / HDR -------------------------------------------
no_hdr = false
boost_colors = 0
boost_frame_colors = 0

# ---- Crop / Letterbox ---------------------------------------
# Remove baked-in letterbox black bars from the video frames.
#   false → no cropping, keep frames as-is (default)
#   auto  → sample 100 random frames, auto-detect black bars at
#           top & bottom, save crop values to the prefs JSON,
#           and apply the crop when generating every GIF.
crop_padding = auto

# ---- AI Description -----------------------------------------
describe = true
describe_model = llava

# ---- Metadata / History ------------------------------------
save_json = true
check_history = true

# ---- Debug -------------------------------------------------
debug = false
